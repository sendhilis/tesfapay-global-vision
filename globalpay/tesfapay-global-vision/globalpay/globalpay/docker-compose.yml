version: '3.8'

services:
  # ── Infrastructure ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: gp-postgres
    ports: ["5432:5432"]
    environment:
      POSTGRES_PASSWORD: devpass
      POSTGRES_USER: globalpay
    volumes:
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U globalpay"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gp-redis
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: gp-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: gp-kafka
    ports: ["9092:9092"]
    depends_on: [zookeeper]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  minio:
    image: minio/minio:latest
    container_name: gp-minio
    ports: ["9000:9000", "9001:9001"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123

  # ── Platform Services ──────────────────────────────────────────
  gp-discovery:
    build: ./gp-discovery
    container_name: gp-discovery
    ports: ["8761:8761"]

  gp-config:
    build: ./gp-gateway
    container_name: gp-config
    ports: ["8888:8888"]
    depends_on: [gp-discovery]

  gp-gateway:
    build: ./gp-gateway
    container_name: gp-gateway
    ports: ["8080:8080"]
    depends_on: [gp-discovery, redis]
    environment:
      SPRING_REDIS_HOST: redis
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://gp-discovery:8761/eureka/

  # ── Business Services ──────────────────────────────────────────
  gp-auth-service:
    build: ./gp-auth-service
    container_name: gp-auth
    ports: ["8081:8081"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_db
      SPRING_DATASOURCE_USERNAME: globalpay
      SPRING_DATASOURCE_PASSWORD: devpass
      SPRING_REDIS_HOST: redis
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://gp-discovery:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-SuperSecretKeyForGlobalPayJWT2024!}
      JWT_EXPIRY_MS: 900000
      JWT_REFRESH_EXPIRY_MS: 604800000

  gp-user-service:
    build: ./gp-user-service
    container_name: gp-user
    ports: ["8082:8082"]
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/user_db
      SPRING_DATASOURCE_USERNAME: globalpay
      SPRING_DATASOURCE_PASSWORD: devpass
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://gp-discovery:8761/eureka/

  gp-wallet-service:
    build: ./gp-wallet-service
    container_name: gp-wallet
    ports: ["8083:8083"]
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_started }
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/wallet_db
      SPRING_DATASOURCE_USERNAME: globalpay
      SPRING_DATASOURCE_PASSWORD: devpass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://gp-discovery:8761/eureka/

  gp-transfer-service:
    build: ./gp-transfer-service
    container_name: gp-transfer
    ports: ["8084:8084"]
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_started }
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/transfer_db
      SPRING_DATASOURCE_USERNAME: globalpay
      SPRING_DATASOURCE_PASSWORD: devpass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://gp-discovery:8761/eureka/

  gp-payment-service:
    build: ./gp-payment-service
    container_name: gp-payment
    ports: ["8085:8085"]
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payment_db
      SPRING_DATASOURCE_USERNAME: globalpay
      SPRING_DATASOURCE_PASSWORD: devpass
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://gp-discovery:8761/eureka/

  gp-savings-service:
    build: ./gp-savings-service
    container_name: gp-savings
    ports: ["8086:8086"]
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/savings_db
      SPRING_DATASOURCE_USERNAME: globalpay
      SPRING_DATASOURCE_PASSWORD: devpass
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://gp-discovery:8761/eureka/

  gp-loan-service:
    build: ./gp-loan-service
    container_name: gp-loan
    ports: ["8087:8087"]
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/loan_db
      SPRING_DATASOURCE_USERNAME: globalpay
      SPRING_DATASOURCE_PASSWORD: devpass
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://gp-discovery:8761/eureka/

  gp-loyalty-service:
    build: ./gp-loyalty-service
    container_name: gp-loyalty
    ports: ["8088:8088"]
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/loyalty_db
      SPRING_DATASOURCE_USERNAME: globalpay
      SPRING_DATASOURCE_PASSWORD: devpass
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://gp-discovery:8761/eureka/

  gp-agent-service:
    build: ./gp-agent-service
    container_name: gp-agent
    ports: ["8089:8089"]
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/agent_db
      SPRING_DATASOURCE_USERNAME: globalpay
      SPRING_DATASOURCE_PASSWORD: devpass
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://gp-discovery:8761/eureka/

  gp-admin-service:
    build: ./gp-admin-service
    container_name: gp-admin
    ports: ["8090:8090"]
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/admin_db
      SPRING_DATASOURCE_USERNAME: globalpay
      SPRING_DATASOURCE_PASSWORD: devpass
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://gp-discovery:8761/eureka/

  gp-notification-service:
    build: ./gp-notification-service
    container_name: gp-notification
    ports: ["8091:8091"]
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_started }
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notification_db
      SPRING_DATASOURCE_USERNAME: globalpay
      SPRING_DATASOURCE_PASSWORD: devpass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://gp-discovery:8761/eureka/

volumes:
  pgdata:

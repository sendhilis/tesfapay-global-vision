  <body>
    <!-- ABX Pre-paint splash: renders instantly before React boots.
         Removed by React's ABXPreloader on mount, or auto-fades after 3s as a safety net. -->
    <style>
      #abx-boot-splash{position:fixed;inset:0;z-index:2147483647;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#FBFAFE 0%,#F2EEFB 55%,#E6E0F7 100%);font-family:'Sora',system-ui,sans-serif;color:#0B0B12;transition:opacity .6s ease;overflow:hidden}
      #abx-boot-splash .abx-mark{font-weight:900;font-size:clamp(96px,18vw,200px);letter-spacing:-0.04em;line-height:.85;position:relative}
      #abx-boot-splash .abx-mark::before,#abx-boot-splash .abx-mark::after{content:"";position:absolute;background:conic-gradient(from 0deg,#3B82F6,#22C55E,#3B82F6);clip-path:polygon(50% 0,57% 43%,100% 50%,57% 57%,50% 100%,43% 57%,0 50%,43% 43%);animation:abxSpin 2.4s ease-in-out infinite}
      #abx-boot-splash .abx-mark::before{width:54px;height:54px;top:-46px;left:8%}
      #abx-boot-splash .abx-mark::after{width:30px;height:30px;top:-18px;left:24%;animation-delay:.4s}
      #abx-boot-splash .abx-tag{margin-top:14px;letter-spacing:.4em;font-size:13px;color:#1F2937;font-weight:500}
      #abx-boot-splash .abx-orb{position:absolute;bottom:-220px;left:50%;transform:translateX(-50%);width:620px;height:620px;border-radius:50%;filter:blur(60px);opacity:.6;background:radial-gradient(circle at 35% 40%,#C7BBF5 0%,#9FB8FF 35%,#E6C2F0 65%,transparent 75%)}
      @keyframes abxSpin{0%,100%{transform:scale(1) rotate(0)}50%{transform:scale(1.12) rotate(10deg)}}
      #abx-boot-splash.abx-hide{opacity:0;pointer-events:none}
    </style>
    <div id="abx-boot-splash" aria-hidden="true">
      <div class="abx-orb"></div>
      <div class="abx-mark">ABX</div>
      <div class="abx-tag">ALPHA&nbsp;&nbsp;BANKING&nbsp;&nbsp;EXPERIENCE</div>
    </div>
    <script>
      // Safety net: if React never mounts or the in-app preloader fails, hide after 3.2s.
      setTimeout(function(){
        var el=document.getElementById('abx-boot-splash');
        if(el){el.classList.add('abx-hide');setTimeout(function(){el&&el.remove();},800);}
      },3200);
    </script>
    <div id="root"></div>
    <script>
      // One-time cleanup: unregister stale service workers and clear caches
      // so users on old PWA builds load the latest bundle (fixes 404 on new routes like /setup).
      (function () {
        try {
          var KEY = "abx-sw-reset-v2";
          if (!localStorage.getItem(KEY) && "serviceWorker" in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              var hadStale = regs.length > 0;
              Promise.all(regs.map(function (r) { return r.unregister(); })).then(function () {
                if (window.caches && caches.keys) {
                  caches.keys().then(function (keys) {
                    Promise.all(keys.map(function (k) { return caches.delete(k); })).then(function () {
                      localStorage.setItem(KEY, "1");
                      if (hadStale) location.reload();
                    });
                  });
                } else {
                  localStorage.setItem(KEY, "1");
                  if (hadStale) location.reload();
                }
              });
            }).catch(function () {});
          }
        } catch (e) {}
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
